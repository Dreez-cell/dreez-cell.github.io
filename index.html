  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      width: 100vw;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    body.light {
      background: #fff;
      color: #000;
    }

    body.dark {
      background: #000;
      color: #fff;
    }

    header {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid;
    }

    body.light header {
      background: #f9f9f9;
      color: #000;
      border-color: #ccc;
    }

    body.dark header {
      background: #111;
      color: #fff;
      border-color: #222;
    }

    .theme-toggle {
      font-size: 20px;
      background: none;
      border: none;
      cursor: pointer;
      color: inherit;
    }

    .story-container {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 10px;
      border-bottom: 1px solid;
    }

    body.light .story-container {
      background: #f2f2f2;
      border-color: #ccc;
    }

    body.dark .story-container {
      background: #111;
      border-color: #222;
    }

    .story {
      flex: 0 0 auto;
      width: 120px;
      height: 180px;
      background: #ddd;
      border-radius: 8px;
      text-align: center;
      overflow: hidden;
      box-shadow: 0 0 6px rgba(0,0,0,0.1);
      transition: transform 0.2s ease;
    }

    body.dark .story {
      background: #222;
      box-shadow: 0 0 6px rgba(255,255,255,0.1);
    }

    .story:hover {
      transform: scale(1.05);
    }

    .story img {
      width: 100%;
      height: 80px;
      object-fit: cover;
      border-bottom: 1px solid #ccc;
      display: block;
      /* Lazy loading will be handled in JS */
    }

    body.dark .story img {
      border-color: #444;
    }

    .story p {
      padding: 5px;
      font-size: 13px;
      line-height: 1.2;
      height: 90px;
      overflow: hidden;
    }

    .ad-box, .thread-box {
      margin: 10px;
      padding: 12px;
      border-radius: 4px;
      box-shadow: 0 0 8px rgba(0,0,0,0.05);
    }

    body.light .ad-box, body.light .thread-box {
      background: #eee;
    }

    body.dark .ad-box, body.dark .thread-box {
      background: #111;
      box-shadow: 0 0 8px rgba(255,255,255,0.05);
    }

    iframe {
      width: 100%;
      height: 500px;
      border: none;
      background: inherit;
    }

    a {
      color: #4ea1ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* Loading spinner for stories */
    #loading-spinner {
      text-align: center;
      padding: 20px;
      font-size: 18px;
      color: #888;
    }
  </style>

<body>

  <header role="banner">
    <span>Testagram</span>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle light or dark theme">🌙</button>
  </header>

  <main role="main">
    <div id="loading-spinner" aria-live="polite" style="display:none;">Loading stories...</div>
    <div id="stories" class="story-container" aria-live="polite" aria-busy="false"></div>
  </main>

  <!-- Custom Ad Block #1 -->

        'params' : {}
      };
    </script>
    <script type="text/javascript" src="//www.highperformanceformat.com/18d0d482298d34bd3713b4a42c4121c6/invoke.js"></script>
  </div>

  <!-- Custom Ad Block #2 -->

    <script type='text/javascript' src='//pl22779142.profitableratecpm.com/17/39/90/173990df9793db05ffad154cf2782fd5.js'></script>
  </div>

  <div class="thread-box" role="complementary" aria-label="Trending topics">
    <iframe src="https://dreez-cell.github.io/Trends/" title="Trending topics"></iframe>
  </div>

  <div class="thread-box" role="region" aria-label="Comments section">
    <div id="disqus_thread"></div>
  </div>

  <script>
    const feeds = [
      'https://www.capitalfm.co.ke/news/feed/',
      'https://www.standardmedia.co.ke/rss/headlines.php',
      'https://www.kenyanwallstreet.com/feed/',
      'https://www.tuko.co.ke/rss/',
      'https://www.ghafla.com/ke/feed/',
      'https://www.nation.africa/kenya/rss',
      'https://www.pd.co.ke/feed/',
      'https://www.kenyan-post.com/feeds/posts/default',
      'https://www.theeastafrican.co.ke/rss.xml',
      'https://www.tuko.co.ke/rss/all.rss',
      'https://www.kenyans.co.ke/feeds/news',
      'https://citizen.digital/news/rss',
      'https://www.businessdailyafrica.com/rss',
      'https://feeds.bbci.co.uk/news/world/africa/rss.xml',
      'https://tech-ish.com/feed/',
      'https://www.nation.africa/kenya/business/rss',
      'https://nairobinews.nation.africa/rss',
      'https://www.kbc.co.ke/feed/'
    ];

    async function extractImageFromHTML(html) {
      const match = html?.match(/<img[^>]+src=["']([^"']+)["']/);
      return match ? match[1] : 'https://via.placeholder.com/120x80?text=No+Image';
    }

    async function getMicrolinkImage(url, fallbackHTML) {
      try {
        const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
        const json = await res.json();
        return json.data.image?.url || await extractImageFromHTML(fallbackHTML);
      } catch {
        return await extractImageFromHTML(fallbackHTML);
      }
    }

    async function loadStories() {
      const container = document.getElementById('stories');
      const spinner = document.getElementById('loading-spinner');
      spinner.style.display = 'block';
      container.setAttribute('aria-busy', 'true');
      container.innerHTML = '';
      try {
        for (const feed of feeds) {
          try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}`);
            const data = await res.json();
            for (let item of data.items.slice(0, 5)) {
              const imgSrc = await getMicrolinkImage(item.link, item.content || item.description);
              const div = document.createElement('div');
              div.className = 'story';
              // Use loading="lazy" for images, alt text from title
              div.innerHTML = `<a href="${item.link}" target="_blank" rel="noopener noreferrer" aria-label="Read article: ${item.title}"><img loading="lazy" src="${imgSrc}" alt="${item.title}"><p>${item.title}</p></a>`;
              container.appendChild(div);
            }
          } catch (err) {
            console.error('Feed error:', feed, err);
            // Append a simple error message inside container but continue loading others
            const errorMsg = document.createElement('p');
            errorMsg.style.color = 'red';
            errorMsg.textContent = `Failed to load feed: ${feed}`;
            container.appendChild(errorMsg);
          }
        }
      } finally {
        spinner.style.display = 'none';
        container.setAttribute('aria-busy', 'false');
      }
    }

    loadStories();
    setInterval(loadStories, 300000); // every 5 minutes

    // Disqus config remains unchanged
    var disqus_config = function () {
      this.page.url = window.location.href;
      this.page.identifier = window.location.pathname;
    };
    (function () {
      var d = document, s = d.createElement('script');
      s.src = 'https://celebrity-gossip-3.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    })();

    function applyTheme(theme) {
      document.body.classList.remove('light', 'dark');
      document.body.classList.add(theme);
    }

    function toggleTheme() {
      const current = document.body.classList.contains('dark') ? 'dark' : 'light';
      const newTheme = current === 'dark' ? 'light' : 'dark';
      applyTheme(newTheme);
      localStorage.setItem('theme', newTheme);

      // Track theme toggle with Firebase Analytics if available
      if(window.gtag) {
        window.gtag('event', 'theme_toggle', { 'new_theme': newTheme });
      }
    }

    (function initializeTheme() {
      const saved = localStorage.getItem('theme');
      if (saved) {
        applyTheme(saved);
      } else {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        applyTheme(prefersDark ? 'dark' : 'light');
      }
    })();
  </script>
