  <style>
    :root {
      --primary: #3a8ee6;
      --primary-hover: #2a6cc0;
      --border-light: #ccc;
      --border-dark: #333;
      --bg-light: #fff;
      --bg-dark: #121212;
      --container-max: 1200px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-width: 100vw;
      overflow-x: hidden;
      background: var(--bg-light);
      color: #000;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 30px;
      transition: background 0.3s, color 0.3s;
    }
    body.light { background: var(--bg-light); color: #000; }
    body.dark { background: var(--bg-dark); color: #eee; }
    header {
      height: 64px;
      width: 100%;
      max-width: var(--container-max);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -1px;
      border-bottom: 1.5px solid var(--border-light);
      background: inherit;
      color: inherit;
      box-shadow: 0 2px 5px rgb(0 0 0 / 0.07);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    body.dark header {
      border-color: var(--border-dark);
      box-shadow: 0 2px 8px rgb(255 255 255 / 0.09);
    }
    .theme-toggle {
      font-size: 2rem;
      background: none;
      border: none;
      cursor: pointer;
      color: inherit;
      transition: transform 0.2s ease;
      outline: none;
    }
    .theme-toggle:focus-visible { outline: 2px solid var(--primary); }
    .theme-toggle:hover { transform: rotate(20deg); }
    .skip-link {
      position: absolute;
      left: -9999px;
      top: 0;
      background: #fff;
      color: #222;
      padding: 8px 16px;
      z-index: 9999;
      border-radius: 0 0 5px 5px;
      font-weight: bold;
    }
    .skip-link:focus {
      left: 10px;
      top: 10px;
      outline: 2px solid var(--primary);
    }
    nav[aria-label="Main navigation"] {
      display: flex;
      gap: 18px;
      font-size: 1.2rem;
    }
    nav a {
      color: inherit;
      text-decoration: none;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background .2s;
    }
    nav a:focus, nav a:hover {
      background: var(--primary);
      color: #fff;
      outline: none;
    }
    main {
      max-width: var(--container-max);
      width: 100%;
      padding: 15px 10px;
      display: flex;
      flex-direction: column;
      gap: 34px;
    }
    section > h2 {
      margin-bottom: 8px;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -.5px;
      color: var(--primary);
    }
    /* --- Carousel 2-row layout --- */
    .carousel-2row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .carousel-2row .story-container-row {
      display: flex;
      overflow-x: auto;
      gap: 14px;
      padding: 10px 5px 0 5px;
      border-bottom: none;
      scroll-behavior: smooth;
      min-height: 0;
    }
    .carousel-2row .story-container-row:last-child {
      border-bottom: 1.5px solid var(--border-light);
    }
    body.dark .carousel-2row .story-container-row:last-child {
      border-color: #444;
    }
    .story {
      flex: 0 0 auto;
      width: 146px;
      height: 232px;
      background: #eee;
      border-radius: 12px;
      text-align: center;
      overflow: hidden;
      box-shadow: 0 0 7px rgba(0,0,0,0.10);
      transition: transform 0.22s, box-shadow 0.28s;
      display: flex;
      flex-direction: column;
      color: inherit;
      position: relative;
    }
    body.dark .story {
      background: #232323;
      box-shadow: 0 0 9px rgba(255,255,255,0.06);
    }
    .story:hover, .story:focus-within {
      transform: scale(1.07);
      box-shadow: 0 0 15px rgba(0,0,0,0.19);
      z-index: 2;
    }
    .story a {
      color: inherit;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .story img {
      width: 100%;
      height: 104px;
      object-fit: cover;
      border-bottom: 1px solid #ccc;
      flex-shrink: 0;
      border-radius: 12px 12px 0 0;
      filter: drop-shadow(0 0 2px rgba(0,0,0,0.05));
      transition: filter 0.3s;
    }
    body.dark .story img {
      border-color: #555;
      filter: drop-shadow(0 0 3px rgba(255,255,255,0.07));
    }
    .story p {
      padding: 8px 6px;
      font-size: 15px;
      line-height: 1.3;
      height: 104px;
      overflow: hidden;
      flex-grow: 1;
      text-align: left;
      font-weight: 600;
    }
    .story time {
      font-size: 12px;
      color: #888;
      margin-bottom: 2px;
      display: block;
      text-align: right;
      padding-right: 6px;
    }
    .ad-box, .thread-box {
      margin: 17px auto;
      padding: 16px;
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0,0,0,0.04);
      max-width: 350px;
      background: #fafafa;
      color: #222;
      transition: background 0.3s, color 0.3s;
    }
    body.dark .ad-box, body.dark .thread-box {
      background: #181818;
      box-shadow: 0 0 13px rgba(255,255,255,0.05);
      color: #ddd;
    }
    iframe {
      width: 100%;
      height: 480px;
      border: none;
      background: inherit;
      border-radius: 8px;
    }
    a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.3s;
    }
    a:hover, a:focus {
      color: var(--primary-hover);
      text-decoration: underline;
      outline: none;
    }
    .spinner {
      width: 34px;
      height: 34px;
      border: 4px solid #ccc;
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 42px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg {
      color: #b00020;
      font-weight: 600;
      text-align: center;
      margin: 21px 0;
    }
    .search-bar {
      margin: 0 auto 16px;
      max-width: 530px;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .search-bar input[type="search"] {
      flex: 1;
      padding: 8px 11px;
      border-radius: 6px;
      border: 1.5px solid var(--border-light);
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }
    .search-bar input[type="search"]:focus {
      border-color: var(--primary);
    }
    .search-bar button {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 18px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 700;
      transition: background 0.2s;
    }
    .search-bar button:focus, .search-bar button:hover {
      background: var(--primary-hover);
    }
    .search-results {
      max-width: var(--container-max);
      margin: 0 auto 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 13px;
      min-height: 36px;
    }
    .search-results .story {
      width: 180px;
      height: 238px;
    }
    .site-footer {
      width: 100%;
      max-width: var(--container-max);
      margin-top: 30px;
      padding: 20px 10px 10px 10px;
      border-top: 1.5px solid #e0e0e0;
      color: #888;
      font-size: 0.9rem;
      background: inherit;
    }
    .site-footer a { color: var(--primary-hover); }
    @media (max-width: 600px) {
      .story { width: 126px; height: 180px; }
      .story p { font-size: 13px; height: 60px; }
      iframe { height: 320px; }
      header { font-size: 1.15rem; height: 48px; }
      .carousel-2row .story-container-row { gap: 10px; }
      .search-results .story { width: 98vw; height: 170px; }
    }
  </style>
</head>

      'https://www.cbssports.com/rss/headlines/','https://www.eurosport.com/rss.xml',
      'https://www.fifa.com/rss-feeds/news','https://www.formula1.com/rss.xml',
      'https://www.espncricinfo.com/rss/content/story/feeds/0.xml','https://www.olympicchannel.com/en/news/rss',
      'https://www.rugbyworld.com/feed','https://www.foxsports.com/feedout/syndicatedContent?categoryId=0',
      'https://www.sportingnews.com/us/rss','https://www.tennis.com/feed/',
      'https://www.golfdigest.com/feed/rss','https://www.cyclingnews.com/rss/news/'
    ];

    // --- Article index for search and sitemap ---
    let articleIndex = [];

    // --- IMAGE UTILS ---
    async function extractImageFromHTML(html) {
      try {
        if (!html) return 'https://via.placeholder.com/140x100?text=No+Image';
        const doc = new DOMParser().parseFromString(html, "text/html");
        const imgEl = doc.querySelector('img');
        return imgEl?.src || 'https://via.placeholder.com/140x100?text=No+Image';
      } catch {
        return 'https://via.placeholder.com/140x100?text=No+Image';
      }
    }
    async function getMicrolinkImage(url, fallbackHTML, altText) {
      try {
        const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
        const json = await res.json();
        return json.data?.image?.url || await extractImageFromHTML(fallbackHTML);
      } catch {
        return await extractImageFromHTML(fallbackHTML);
      }
    }

    // --- LOADING/ERROR STATES ---
    function showLoading(container) {
      container.innerHTML = '<div class="spinner" aria-label="Loading"></div>';
      container.setAttribute('aria-busy', 'true');
    }
    function showError(container, msg = 'Some feeds failed to load. Please check your internet connection or try again later.') {
      [...container.querySelectorAll('.error-msg')].forEach(e => e.remove());
      const errorDiv = document.createElement('div');
      errorDiv.className = 'error-msg';
      errorDiv.textContent = msg;
      container.appendChild(errorDiv);
      container.setAttribute('aria-busy', 'false');
    }

    // --- MAIN FEED LOADER for 2-row carousels ---
    async function loadFeedStories2Rows(feedList, sliceCount, row1Id, row2Id, alt, updateIndex = false) {
      const row1 = document.getElementById(row1Id);
      const row2 = document.getElementById(row2Id);
      if (!row1 || !row2) return;
      showLoading(row1); showLoading(row2);
      row1.innerHTML = ''; row2.innerHTML = '';
      let loadedAny = false;
      let allStories = [];
      // Fetch feeds in parallel, but load each feed separately to avoid API block
      await Promise.all(feedList.map(async (feed, feedNum) => {
        try {
          await new Promise(res => setTimeout(res, feedNum * 120)); // stagger for API
          const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}`);
          if (!res.ok) throw new Error('Request failed');
          const data = await res.json();
          if (!data.items || !Array.isArray(data.items) || data.items.length === 0) throw new Error('Invalid/empty RSS data');
          const items = data.items
            .filter(item => item && item.title && item.link && item.pubDate)
            .map(item => ({
              ...item,
              pubDateObj: new Date(item.pubDate)
            }))
            .sort((a, b) => b.pubDateObj - a.pubDateObj) // sort by date, latest first
            .slice(0, sliceCount);
          for (let item of items) {
            const img = await getMicrolinkImage(item.link, item.content || item.description, item.title);
            allStories.push({
              link: item.link,
              title: item.title,
              img,
              pubDate: item.pubDate,
              pubDateObj: item.pubDateObj,
              section: alt
            });
            loadedAny = true;
          }
        } catch (err) {
          // console.error(`${alt} Feed error:`, feed, err);
        }
      }));
      // Sort and split for latest-to-oldest
      allStories.sort((a, b) => b.pubDateObj - a.pubDateObj);
      const half = Math.ceil(allStories.length / 2);
      const row1Stories = allStories.slice(0, half);
      const row2Stories = allStories.slice(half);
      for (let story of row1Stories) {
        const div = document.createElement('div');
        div.className = 'story';
        div.innerHTML = `<a href="${story.link}" target="_blank" rel="noopener noreferrer" tabindex="0">
          <img src="${story.img}" alt="${story.title}">
          <time datetime="${story.pubDate}">${new Date(story.pubDate).toLocaleDateString()}</time>
          <p></p>
        </a>`;
        div.querySelector('p').textContent = story.title;
        row1.appendChild(div);
      }
      for (let story of row2Stories) {
        const div = document.createElement('div');
        div.className = 'story';
        div.innerHTML = `<a href="${story.link}" target="_blank" rel="noopener noreferrer" tabindex="0">
          <img src="${story.img}" alt="${story.title}">
          <time datetime="${story.pubDate}">${new Date(story.pubDate).toLocaleDateString()}</time>
          <p></p>
        </a>`;
        div.querySelector('p').textContent = story.title;
        row2.appendChild(div);
      }
      if (!loadedAny) {
        showError(row1, `All ${alt} feeds failed to load.`);
        showError(row2, `All ${alt} feeds failed to load.`);
      } else if (allStories.length < feedList.length * sliceCount) {
        showError(row1, `Some ${alt} feeds failed to load.`);
        showError(row2, `Some ${alt} feeds failed to load.`);
      }
      row1.setAttribute('aria-busy', 'false');
      row2.setAttribute('aria-busy', 'false');

      // Article index for search and sitemap
      if (updateIndex) {
        articleIndex = articleIndex.concat(allStories);
      }
    }

    // --- LOAD & REFRESH ---
    function reloadAll() {
      articleIndex = [];
      loadFeedStories2Rows(feeds, 5, 'stories-row1', 'stories-row2', 'general', true);
      loadFeedStories2Rows(hiphopFeeds, 3, 'hiphop-row1', 'hiphop-row2', 'hiphop', true);
      loadFeedStories2Rows(sportsFeeds, 2, 'sports-row1', 'sports-row2', 'sports', true);
    }
    reloadAll();
    setInterval(() => loadFeedStories2Rows(feeds, 5, 'stories-row1', 'stories-row2', 'general', true), 360000);
    setInterval(() => loadFeedStories2Rows(hiphopFeeds, 3, 'hiphop-row1', 'hiphop-row2', 'hiphop', true), 210000);
    setInterval(() => loadFeedStories2Rows(sportsFeeds, 2, 'sports-row1', 'sports-row2', 'sports', true), 270000);

    // --- SEARCH ---
    function searchArticles() {
      const q = document.getElementById('search-input').value.trim().toLowerCase();
      const resultsDiv = document.getElementById('search-results');
      resultsDiv.innerHTML = '';
      if (!q || !articleIndex.length) return;
      const results = articleIndex.filter(story =>
        story.title.toLowerCase().includes(q) ||
        (story.section && story.section.toLowerCase().includes(q))
      ).sort((a, b) => b.pubDateObj - a.pubDateObj).slice(0, 20);
      if (!results.length) {
        resultsDiv.innerHTML = '<div class="error-msg">No articles found for your search.</div>';
        return;
      }
      for (const story of results) {
        const div = document.createElement('div');
        div.className = 'story';
        div.innerHTML = `<a href="${story.link}" target="_blank" rel="noopener noreferrer" tabindex="0">
          <img src="${story.img}" alt="${story.title}">
          <time datetime="${story.pubDate}">${new Date(story.pubDate).toLocaleDateString()}</time>
          <p></p>
        </a>`;
        div.querySelector('p').textContent = story.title;
        resultsDiv.appendChild(div);
      }
    }

    // Keyboard accessibility for search
    document.getElementById('search-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') searchArticles();
    });

    // --- SITEMAP GENERATION (for SPA) ---
    // On demand, write a sitemap compatible with search engines, for loaded articles
    function generateSitemap() {
      let xml = '<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n';
      const base = 'https://dreez-cell.github.io/';
      const today = new Date().toISOString();
      xml += `<url><loc>${base}</loc><lastmod>${today}</lastmod><priority>1.0</priority></url>\n`;
      (articleIndex || []).forEach(story => {
        xml += `<url><loc>${story.link}</loc><lastmod>${story.pubDate || today}</lastmod><priority>0.8</priority></url>\n`;
      });
      xml += '</urlset>';
      const blob = new Blob([xml], {type: 'application/xml'});
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url; link.download = 'sitemap.xml';
      document.body.appendChild(link); link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 100);
    }

    // --- DISQUS EMBED: World-class, accessible, SEO-friendly ---
    var disqus_config = function () {
      this.page.url = window.location.href;
      this.page.identifier = window.location.pathname;
    };
    (function () {
      var d = document, s = d.createElement('script');
      s.src = 'https://celebrity-gossip-3.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      s.setAttribute('async', 'async');
      s.setAttribute('defer', 'defer');
      s.setAttribute('crossorigin', 'anonymous');
      (d.head || d.body).appendChild(s);
    })();

    // --- THEME SWITCH ---
    function applyTheme(theme) {
      document.body.classList.remove('light', 'dark');
      document.body.classList.add(theme);
      const btn = document.querySelector('.theme-toggle');
      btn.textContent = theme === 'dark' ? '☀️' : '🌙';
    }
    function toggleTheme() {
      const current = document.body.classList.contains('dark') ? 'dark' : 'light';
      const newTheme = current === 'dark' ? 'light' : 'dark';
      applyTheme(newTheme);
      localStorage.setItem('theme', newTheme);
    }
    (function initializeTheme() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const themeToApply = saved || (prefersDark ? 'dark' : 'light');
      applyTheme(themeToApply);
    })();

    // --- Lazy-load images for speed and data efficiency ---
    document.addEventListener('DOMContentLoaded', function() {
      let lazyImages = [].slice.call(document.querySelectorAll('img[loading="lazy"]'));
      if ('IntersectionObserver' in window) {
        let lazyImageObserver = new IntersectionObserver(function(entries, observer) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              let lazyImage = entry.target;
              lazyImage.src = lazyImage.dataset.src;
              lazyImageObserver.unobserve(lazyImage);
            }
          });
        });
        lazyImages.forEach(function(lazyImage) {
          lazyImageObserver.observe(lazyImage);
        });
      }
    });
  </script>
</body>
