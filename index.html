<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Testagram - Trending News & More</title>
  <meta name="description" content="Stay updated with the latest news, hip hop stories, and sports highlights. Powered by Testagram." />
  <meta name="keywords" content="news, hip hop, sports, trending, Testagram" />
  <meta name="author" content="Testagram Team" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Dyslexic:400,700&display=swap">
  <style>
    :root {
      --primary: #3a8ee6;
      --primary-hover: #2a6cc0;
      --border-light: #ccc;
      --bg-light: #fff;
      --bg-dark: #121212;
      --container-max: 1200px;
      --success: #25c685;
      --danger: #e74c3c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-width: 100vw;
      overflow-x: hidden;
      background: var(--bg-light);
      color: #000;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 30px;
      transition: background 0.3s, color 0.3s;
    }
    body.dark { background: var(--bg-dark); color: #eee; }
    body.dyslexia { font-family: 'OpenDyslexic', Arial, sans-serif !important; letter-spacing: 1.1px; line-height: 1.8 !important;}
    header {
      height: 56px;
      width: 100%;
      max-width: var(--container-max);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 22px;
      font-weight: 700;
      border-bottom: 1px solid var(--border-light);
      background: inherit;
      color: inherit;
      box-shadow: 0 2px 5px rgb(0 0 0 / 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    body.dark header {
      border-color: #333;
      box-shadow: 0 2px 8px rgb(255 255 255 / 0.1);
    }
    .theme-toggle {
      font-size: 22px;
      background: none;
      border: none;
      cursor: pointer;
      color: inherit;
      transition: transform 0.2s ease;
      outline: none;
    }
    .theme-toggle:hover { transform: rotate(20deg); }
    .search-bar {
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 15px 0 5px 0;
    }
    .search-bar input[type="search"] {
      padding: 8px 12px;
      border: 1px solid var(--border-light);
      border-radius: 4px 0 0 4px;
      font-size: 1rem;
      width: 320px;
      max-width: 80vw;
      outline: none;
      transition: border-color 0.2s;
      background: inherit;
      color: inherit;
    }
    .search-bar button {
      padding: 8px 14px;
      background: var(--primary);
      color: #fff;
      border: 1px solid var(--primary);
      border-radius: 0 4px 4px 0;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .search-bar button:hover { background: var(--primary-hover); }
    .search-bar input[type="search"]:focus { border-color: var(--primary); }
    main {
      max-width: var(--container-max);
      width: 100%;
      padding: 15px 10px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }
    section > h2 {
      margin-bottom: 8px;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -.5px;
    }
    .carousel-2row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .carousel-2row .story-container-row {
      display: flex;
      overflow-x: auto;
      gap: 14px;
      padding: 10px 5px 0 5px;
      border-bottom: none;
      scroll-behavior: smooth;
      min-height: 0;
    }
    .carousel-2row .story-container-row:last-child {
      border-bottom: 1px solid var(--border-light);
    }
    .story {
      flex: 0 0 auto;
      width: 140px;
      height: 240px;
      background: #eee;
      border-radius: 8px;
      text-align: center;
      overflow: hidden;
      box-shadow: 0 0 6px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.3s;
      display: flex;
      flex-direction: column;
      color: inherit;
      position: relative;
    }
    body.dark .story { background: #2a2a2a; }
    .story:hover {
      transform: scale(1.07);
      box-shadow: 0 0 14px rgba(0,0,0,0.2);
    }
    .story a {
      color: inherit;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .story img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-bottom: 1px solid #ccc;
      flex-shrink: 0;
      border-radius: 8px 8px 0 0;
      filter: drop-shadow(0 0 2px rgba(0,0,0,0.05));
      transition: filter 0.3s;
    }
    .story p {
      padding: 8px 6px;
      font-size: 14px;
      line-height: 1.3;
      height: 100px;
      overflow: hidden;
      flex-grow: 1;
      text-align: left;
      font-weight: 600;
    }
    .summarize-btn {
      position:absolute; bottom:8px; left:8px;
      background: var(--primary);
      color:#fff; border:none; border-radius:5px; font-size:13px; padding: 3px 11px; cursor:pointer;
      z-index:1; opacity: 0.85;
    }
    .summarize-btn:hover { opacity:1; background: var(--primary-hover);}
    .sentiment-badge {
      position:absolute; top:7px; left:7px;
      font-size:18px; padding:1px 5px; border-radius:5px; color:#fff; font-weight:700; z-index:2;
      background:#999;
    }
    .sentiment-positive { background:#25c685;}
    .sentiment-neutral { background:#888;}
    .sentiment-negative { background:#e74c3c;}
    /* Trending cloud */
    #trending-cloud {
      position: fixed;
      top: 70px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.91);
      color: #333;
      border-radius: 20px;
      padding: 7px 20px 6px 20px;
      font-size: 1.1rem;
      z-index: 9999;
      box-shadow: 0 2px 22px rgba(0,0,0,0.08);
      display: flex; flex-wrap: wrap; gap: 10px;
      max-width: 90vw;
    }
    #trending-cloud .trend-word { font-weight: bold; cursor: pointer; }
    #trending-cloud .trend-word:hover { color: var(--primary); text-decoration: underline; }
    /* Dyslexia mode */
    .dyslexia-toggle { position:fixed;bottom:20px;right:20px;z-index:99999;padding:8px 17px;font-size:18px;background:var(--primary);color:#fff;border:none;border-radius:7px;cursor:pointer;}
    .dyslexia-toggle.active { background: #25c685;}
    /* News Ticker */
    #news-ticker-bar {
      width: 100vw;
      overflow: hidden;
      background: var(--primary);
      color: #fff;
      font-size: 1rem;
      white-space: nowrap;
      position: fixed;
      top: 0; left: 0; z-index: 10001;
      height: 28px; display:flex; align-items:center;
    }
    #news-ticker-bar span { display:inline-block; padding-left: 100vw; animation: ticker-scroll 50s linear infinite;}
    @keyframes ticker-scroll {
      0% { transform: translateX(0);}
      100% { transform: translateX(-100vw);}
    }
    #summary-modal-bg {
      position:fixed;z-index:100010;top:0;left:0;right:0;bottom:0;
      background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;}
    #summary-modal-bg.active {display:flex;}
    #summary-modal {
      background:#fff;color:#222;max-width:500px;border-radius:11px;padding:24px 18px;box-shadow:0 8px 34px rgba(0,0,0,0.13);position:relative;
    }
    #summary-modal .close-modal {position:absolute;right:11px;top:7px;background:none;border:none;font-size:23px;cursor:pointer;}
    #summary-modal h4 {margin-bottom:10px;}
    .spinner {
      width: 32px;
      height: 32px;
      border: 4px solid #ccc;
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 40px auto;
    }
    @media (max-width: 600px) {
      .story { width: 120px; height: 190px; }
      .story p { font-size: 13px; height: 80px; }
      #trending-cloud { font-size: .97rem; top:48px; }
    }
  </style>
</head>

async function extractImageFromHTML(html) {
  try {
    if (!html) return 'https://via.placeholder.com/140x100?text=No+Image';
    const doc = new DOMParser().parseFromString(html, "text/html");
    const imgEl = doc.querySelector('img');
    return imgEl?.src || 'https://via.placeholder.com/140x100?text=No+Image';
  } catch {
    return 'https://via.placeholder.com/140x100?text=No+Image';
  }
}
async function getMicrolinkImage(url, fallbackHTML, altText) {
  try {
    const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
    const json = await res.json();
    return json.data?.image?.url || await extractImageFromHTML(fallbackHTML);
  } catch {
    return await extractImageFromHTML(fallbackHTML);
  }
}

function showLoading(container) {
  container.innerHTML = '<div class="spinner" aria-label="Loading"></div>';
  container.setAttribute('aria-busy', 'true');
}
function showError(container, msg = 'Some feeds failed to load.') {
  [...container.querySelectorAll('.error-msg')].forEach(e => e.remove());
  const errorDiv = document.createElement('div');
  errorDiv.className = 'error-msg';
  errorDiv.textContent = msg;
  container.appendChild(errorDiv);
  container.setAttribute('aria-busy', 'false');
}

// AI Summarizer (uses SMMRY public API as demo/free, replace for production)
async function fetchSummary(text) {
  try {
    const resp = await fetch("https://api.smmry.com?SM_API_KEY=F70F6E9C18&SM_WITH_BREAK&SM_LENGTH=7&SM_KEYWORD_COUNT=3", {
      method: "POST",
      headers: {"Content-Type": "application/x-www-form-urlencoded"},
      body: "sm_api_input=" + encodeURIComponent(text)
    });
    const data = await resp.json();
    return data.sm_api_content || data.sm_api_message || "No summary available.";
  } catch {
    return "Summary unavailable (API quota exceeded).";
  }
}
function showSummaryModal(title, content) {
  document.getElementById('summary-title').textContent = title;
  document.getElementById('summary-content').textContent = content;
  document.getElementById('summary-modal-bg').classList.add('active');
}
function closeSummaryModal() {
  document.getElementById('summary-modal-bg').classList.remove('active');
}
document.getElementById('summary-modal-bg').onclick = function(e){
  if (e.target === this) closeSummaryModal();
};
document.addEventListener('keydown', e => {if (e.key === 'Escape') closeSummaryModal();});

function extractTrendingWords(allStories) {
  const stopwords = new Set(['the','a','an','in','on','for','and','to','of','at','by','as','it','is','with','from','that','this','are','be','has','have','was','but','not','or','you','he','she','his','her','they','their','them','its','will','who','about','over','after','up','out']);
  let wordCounts = {};
  allStories.forEach(story=>{
    const txt = (story.title + " " + (story.description||"")).toLowerCase();
    txt.replace(/[#'\-:()/.,!?"\[\]]/g, ' ').split(/\s+/).forEach(word=>{
      if(word.length>3 && !stopwords.has(word)) wordCounts[word]=1+(wordCounts[word]||0);
    });
  });
  return Object.entries(wordCounts).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([w,c])=>w);
}
function updateTrendingCloud(words) {
  const cloud = document.getElementById('trending-cloud');
  if (!words.length) { cloud.style.display='none'; return;}
  cloud.innerHTML = words.map(w=>`<span class="trend-word">${w}</span>`).join('');
  cloud.style.display = '';
}

function analyzeSentiment(text) {
  const pos = ['win','growth','success','happy','profit','record','rise','increase','love','good','positive','strong'];
  const neg = ['fail','loss','attack','death','decline','fall','negative','weak','crisis','bad','down','hurt','injury'];
  let score = 0;
  text = (text||"").toLowerCase();
  pos.forEach(w=>{if(text.includes(w))score++;});
  neg.forEach(w=>{if(text.includes(w))score--;});
  if(score>1) return {label:"Positive",class:"sentiment-positive",icon:"😊"};
  if(score<-1) return {label:"Negative",class:"sentiment-negative",icon:"😢"};
  return {label:"Neutral",class:"sentiment-neutral",icon:"😐"};
}

document.getElementById('dyslexia-btn').onclick = function(){

  this.classList.toggle('active');

if(localStorage.getItem('dyslexia')==="1") {
  document.body.classList.add('dyslexia');
  document.getElementById('dyslexia-btn').classList.add('active');
}

function updateNewsTicker(headlines) {
  const bar = document.getElementById('news-ticker-bar');
  const content = document.getElementById('news-ticker-content');
  if (!headlines.length) { bar.style.display='none'; return;}
  content.innerHTML = headlines.map(h=>`<span style="margin-right:40px;">${h}</span>`).join('');
  bar.style.display = '';
}

window._allStoriesCache = [];

async function loadFeedStories2Rows(feedList, sliceCount, row1Id, row2Id, alt, searchTerm = '') {
  const row1 = document.getElementById(row1Id);
  const row2 = document.getElementById(row2Id);
  if (!row1 || !row2) return;
  showLoading(row1);
  showLoading(row2);
  row1.innerHTML = '';
  row2.innerHTML = '';
  let loadedAny = false;
  let allStories = [];
  for (let feed of feedList) {
    try {
      const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}`);
      if (!res.ok) throw new Error('Request failed');
      const data = await res.json();
      if (!data.items || !Array.isArray(data.items) || data.items.length === 0) throw new Error('Invalid/empty RSS data');
      let items = data.items.slice(0, sliceCount).filter(item => item && item.title && item.link);
      if (searchTerm) {
        const term = searchTerm.toLowerCase();
        items = items.filter(item =>
          (item.title && item.title.toLowerCase().includes(term)) ||
          (item.description && item.description.toLowerCase().includes(term)) ||
          (item.content && item.content.toLowerCase().includes(term))
        );
      }
      for (let item of items) {
        const img = await getMicrolinkImage(item.link, item.content || item.description, item.title);
        allStories.push({
          link: item.link,
          title: item.title,
          description: item.description || item.content || "",
          img
        });
        loadedAny = true;
      }
    } catch (err) {
      console.error(`${alt} Feed error:`, feed, err);
    }
  }
  // Save to cache for trending/ticker
  if (!window._allStoriesCache) window._allStoriesCache = [];
  if (alt === 'story') window._allStoriesCache = allStories.concat(window._allStoriesCache);
  else window._allStoriesCache = window._allStoriesCache.concat(allStories);
  const half = Math.ceil(allStories.length / 2);
  const row1Stories = allStories.slice(0, half);
  const row2Stories = allStories.slice(half);
  for (let story of row1Stories) {
    const div = document.createElement('div');
    div.className = 'story';
    div.innerHTML = `
<a href="${story.link}" target="_blank" rel="noopener noreferrer">
  <img src="${story.img}" alt="${story.title}">
  <p></p>
</a>`;
    div.querySelector('p').textContent = story.title;
    // Sentiment
    let sent = analyzeSentiment(story.title+" "+(story.description||""));
    let badge = document.createElement('span');
    badge.className = `sentiment-badge ${sent.class}`;
    badge.textContent = sent.icon;
    div.appendChild(badge);
    // Summarize button
    let btn = document.createElement('button');
    btn.className = "summarize-btn";
    btn.textContent = "Summarize";
    btn.onclick = async (e)=>{
      e.preventDefault();
      btn.textContent = "Summarizing...";
      btn.disabled = true;
      let summary = await fetchSummary(`${story.title}. ${story.description}`);
      showSummaryModal(story.title, summary);
      btn.textContent = "Summarize";
      btn.disabled = false;
    };
    div.appendChild(btn);
    row1.appendChild(div);
  }
  for (let story of row2Stories) {
    const div = document.createElement('div');
    div.className = 'story';
    div.innerHTML = `
<a href="${story.link}" target="_blank" rel="noopener noreferrer">
  <img src="${story.img}" alt="${story.title}">
  <p></p>
</a>`;
    div.querySelector('p').textContent = story.title;
    // Sentiment
    let sent = analyzeSentiment(story.title+" "+(story.description||""));
    let badge = document.createElement('span');
    badge.className = `sentiment-badge ${sent.class}`;
    badge.textContent = sent.icon;
    div.appendChild(badge);
    // Summarize button
    let btn = document.createElement('button');
    btn.className = "summarize-btn";
    btn.textContent = "Summarize";
    btn.onclick = async (e)=>{
      e.preventDefault();
      btn.textContent = "Summarizing...";
      btn.disabled = true;
      let summary = await fetchSummary(`${story.title}. ${story.description}`);
      showSummaryModal(story.title, summary);
      btn.textContent = "Summarize";
      btn.disabled = false;
    };
    div.appendChild(btn);
    row2.appendChild(div);
  }
  if (!loadedAny) {
    showError(row1, `All ${alt} feeds failed to load.`);
    showError(row2, `All ${alt} feeds failed to load.`);
  }
  row1.setAttribute('aria-busy', 'false');
  row2.setAttribute('aria-busy', 'false');
  setTimeout(()=>enhanceStoriesUI(window._allStoriesCache), 100);
}

// Trending and Ticker UI
function enhanceStoriesUI(allStories) {
  updateTrendingCloud(extractTrendingWords(allStories));
  updateNewsTicker(allStories.slice(0,10).map(s=>s.title));
}

function searchStories() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) {
    reloadAll();
    return;
  }
  window._allStoriesCache = [];
  loadFeedStories2Rows(feeds, 5, 'stories-row1', 'stories-row2', 'story', q);
  loadFeedStories2Rows(hiphopFeeds, 3, 'hiphop-row1', 'hiphop-row2', 'hiphop', q);
  loadFeedStories2Rows(sportsFeeds, 2, 'sports-row1', 'sports-row2', 'sports', q);
}
document.getElementById('searchInput').addEventListener('input', function(e) {
  if (this.value.trim().length === 0) reloadAll();
});

// Theme switching
function applyTheme(theme) {
  document.body.classList.remove('light', 'dark');
  document.body.classList.add(theme);
  const btn = document.querySelector('.theme-toggle');
  btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  const current = document.body.classList.contains('dark') ? 'dark' : 'light';
  const newTheme = current === 'dark' ? 'light' : 'dark';
  applyTheme(newTheme);
  localStorage.setItem('theme', newTheme);
}
(function initializeTheme() {
  const saved = localStorage.getItem('theme');
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  const themeToApply = saved || (prefersDark ? 'dark' : 'light');
  applyTheme(themeToApply);
})();

function reloadAll() {
  window._allStoriesCache = [];
  loadFeedStories2Rows(feeds, 5, 'stories-row1', 'stories-row2', 'story');
  loadFeedStories2Rows(hiphopFeeds, 3, 'hiphop-row1', 'hiphop-row2', 'hiphop');
  loadFeedStories2Rows(sportsFeeds, 2, 'sports-row1', 'sports-row2', 'sports');
}
reloadAll();
setInterval(() => loadFeedStories2Rows(feeds, 5, 'stories-row1', 'stories-row2', 'story'), 300000);
setInterval(() => loadFeedStories2Rows(hiphopFeeds, 3, 'hiphop-row1', 'hiphop-row2', 'hiphop'), 180000);
setInterval(() => loadFeedStories2Rows(sportsFeeds, 2, 'sports-row1', 'sports-row2', 'sports'), 240000);
</script>
