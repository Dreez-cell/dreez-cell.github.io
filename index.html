  <style>
    :root {
      --primary: #3a8ee6;
      --primary-hover: #2a6cc0;
      --border-light: #ccc;
      --border-dark: #333;
      --bg-light: #fff;
      --bg-dark: #121212;
      --container-max: 1200px;
      --side-width: 320px;
      --main-width: 750px;
      --gap: 30px;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.09);
      --shadow-dark: 0 2px 20px rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-light);
      color: #000;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 30px;
      transition: background 0.3s, color 0.3s;
    }
    body.light { background: var(--bg-light); color: #000; }
    body.dark { background: var(--bg-dark); color: #eee; }
    header {
      height: 64px;
      width: 100%;
      max-width: var(--container-max);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
      border-bottom: 1px solid var(--border-light);
      background: inherit;
      color: inherit;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
      border-radius: 0 0 var(--radius) var(--radius);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    body.dark header {
      border-color: var(--border-dark);
      box-shadow: var(--shadow-dark);
    }
    .theme-toggle {
      font-size: 2rem;
      background: none;
      border: none;
      cursor: pointer;
      color: inherit;
      transition: transform 0.2s ease;
      outline: none;
    }
    .theme-toggle:focus-visible { outline: 2px solid var(--primary); }
    .theme-toggle:hover { transform: rotate(20deg) scale(1.15); }
    .skip-link {
      position: absolute;
      left: -9999px;
      top: 0;
      background: #fff;
      color: #222;
      padding: 8px 16px;
      z-index: 9999;
      border-radius: 0 0 5px 5px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.13);
      transition: left 0.2s;
    }
    .skip-link:focus {
      left: 10px;
      top: 10px;
      outline: 2px solid var(--primary);
    }
    /* --- MAIN LAYOUT --- */
    .layout {
      display: flex;
      flex-direction: row;
      gap: var(--gap);
      width: 100%;
      max-width: var(--container-max);
      margin: 0 auto;
      padding: var(--gap) 10px 0 10px;
      min-height: 80vh;
      align-items: flex-start;
    }
    .main-content {
      flex: 1 1 var(--main-width);
      max-width: var(--main-width);
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .sidebar {
      flex: 0 0 var(--side-width);
      max-width: var(--side-width);
      min-width: 260px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      position: sticky;
      top: 85px;
      align-self: flex-start;
    }
    section > h2 {
      margin-bottom: 8px;
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: -.5px;
      color: var(--primary-hover);
      text-shadow: 0 2px 8px rgba(58,142,230,0.09);
    }
    .carousel-2row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .carousel-2row .story-container-row {
      display: flex;
      overflow-x: auto;
      gap: 18px;
      padding: 10px 5px 0 5px;
      border-bottom: none;
      scroll-behavior: smooth;
      min-height: 0;
      scrollbar-width: thin;
      scrollbar-color: var(--primary) #eaeaea;
    }
    .carousel-2row .story-container-row:last-child {
      border-bottom: 1px solid var(--border-light);
    }
    body.dark .carousel-2row .story-container-row:last-child {
      border-color: #444;
    }
    body.light .carousel-2row .story-container-row:last-child {
      border-color: #ddd;
    }
    .story {
      flex: 0 0 auto;
      width: 140px;
      height: 220px;
      background: #f8f9fa;
      border-radius: var(--radius);
      text-align: center;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.11);
      transition: transform 0.22s cubic-bezier(.4,2,.3,1), box-shadow 0.3s;
      display: flex;
      flex-direction: column;
      color: inherit;
      border: 1.5px solid transparent;
      position: relative;
    }
    body.dark .story {
      background: #2a2a2a;
      box-shadow: 0 2px 8px rgba(255,255,255,0.07);
    }
    .story:hover, .story:focus-within {
      transform: scale(1.08) translateY(-7px);
      box-shadow: 0 10px 26px 0 rgba(58,142,230,0.19), 0 2px 6px rgba(0,0,0,0.13);
      border: 1.5px solid var(--primary);
      z-index: 2;
    }
    .story a {
      color: inherit;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      height: 100%;
      outline: none;
    }
    .story img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-bottom: 1.5px solid #ccc;
      flex-shrink: 0;
      border-radius: var(--radius) var(--radius) 0 0;
      filter: drop-shadow(0 0 2px rgba(0,0,0,0.06));
      transition: filter 0.3s, background 0.3s;
      background: #e8e8e8;
      display: block;
      aspect-ratio: 14/10;
    }
    body.dark .story img {
      border-color: #555;
      filter: drop-shadow(0 0 3px rgba(255,255,255,0.10));
      background: #232323;
    }
    .story img.loading {
      filter: blur(6px) grayscale(80%);
      background: #eaeaea;
    }
    .story img.error {
      content: url('https://via.placeholder.com/140x100?text=News');
      background: #f2f2f2;
    }
    .story p {
      padding: 10px 7px 0 7px;
      font-size: 15px;
      line-height: 1.35;
      height: 100px;
      overflow: hidden;
      flex-grow: 1;
      text-align: left;
      font-weight: 600;
      color: inherit;
      letter-spacing: -.3px;
    }
    /* --- SIDEBAR --- */
    .ad-box, .thread-box {
      margin: 0 0 12px 0;
      padding: 18px 16px;
      border-radius: var(--radius);
      box-shadow: 0 0 12px rgba(0,0,0,0.07);
      background: #fafbfe;
      color: #222;
      transition: background 0.3s, color 0.3s;
      width: 100%;
      max-width: 100%;
      position: relative;
    }
    body.dark .ad-box, body.dark .thread-box {
      background: #1a1a1a;
      box-shadow: 0 0 16px rgba(255,255,255,0.09);
      color: #ddd;
    }
    /* --- DISQUS SECTION --- */
    .disqus-section {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: 0 2px 24px rgba(0,0,0,0.13);
      padding: 26px 24px 0 24px;
      margin-top: 44px;
      width: 100%;
      max-width: var(--main-width);
      min-height: 360px;
      position: relative;
      z-index: 10;
      border: 1px solid #eee;
    }
    body.dark .disqus-section {
      background: #181818;
      box-shadow: 0 2px 28px rgba(255,255,255,0.07);
      border-color: #282828;
    }
    .disqus-section h2 {
      font-size: 1.28rem;
      font-weight: 800;
      margin-bottom: 12px;
      color: var(--primary-hover);
      letter-spacing: -.5px;
    }
    /* --- TRENDS IFRAME --- */
    .trends-box {
      margin: 36px 0 0 0;
      padding: 12px 0 10px 0;
      border-radius: var(--radius);
      box-shadow: 0 0 8px rgba(0,0,0,0.08);
      background: #f7fafc;
      color: #222;
      width: 100%;
      max-width: 100%;
      min-height: 220px;
    }
    body.dark .trends-box {
      background: #22263b;
      color: #f4f8ff;
      box-shadow: 0 0 16px rgba(255,255,255,0.12);
    }
    .trends-box iframe {
      width: 100%;
      min-height: 340px;
      border: none;
      border-radius: var(--radius);
      background: inherit;
      transition: box-shadow 0.2s;
      box-shadow: 0 2px 16px rgba(58,142,230,0.10);
    }
    a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.3s;
    }
    a:hover, a:focus {
      color: var(--primary-hover);
      text-decoration: underline;
      outline: none;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 4px solid #ccc;
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg {
      color: #b00020;
      font-weight: 600;
      text-align: center;
      margin: 20px 0;
    }
    @media (max-width: 1200px) {
      .layout { max-width: 100vw; }
      .main-content { max-width: 96vw; }
      .sidebar { max-width: 280px; min-width: 200px; }
    }
    @media (max-width: 900px) {
      .layout { flex-direction: column; gap: 0; padding-left: 0; padding-right: 0;}
      .main-content { max-width: 100vw; }
      .sidebar { position: static; max-width: 100vw; flex-direction: row; gap: 18px; margin-bottom: 0; }
      .ad-box, .thread-box { max-width: 340px; margin: 0 10px 12px 0; }
    }
    @media (max-width: 700px) {
      header { font-size: 1.3rem; height: 48px;}
      .main-content { gap: 15px; }
      .disqus-section { padding: 10px 2px 0 2px; }
      .carousel-2row .story-container-row { gap: 10px; }
      .sidebar { flex-direction: column; gap: 14px; }
    }
    @media (max-width: 600px) {
      .story { width: 120px; height: 190px; }
      .story p { font-size: 13px; height: 80px; }
      .disqus-section, .trends-box { min-height: 100px; }
      .sidebar { min-width: 0; max-width: 100vw; }
    }
    @media (max-width: 400px) {
      .story { width: 98vw; height: 150px; }
      .disqus-section { padding: 4px 0 0 0;}
      header { font-size: 1rem; }
    }
    @media (max-width: 350px) {
      .layout { padding: 2px; }
      .ad-box, .thread-box { padding: 4px; }
    }
  </style>
</head>

  <script>
    const feeds = [
      'https://www.capitalfm.co.ke/news/feed/',
      'https://www.standardmedia.co.ke/rss/headlines.php',
      'https://www.kenyanwallstreet.com/feed/',

    const hiphopFeeds = [
      'https://allhiphop.com/feed/',
      'https://www.xxlmag.com/feed/',
      'https://hiphopwired.com/feed/',
      'https://hiphop-n-more.com/feed/',
      'https://undergroundhiphopblog.com/feed/',
      'https://thesource.com/feed/',
      'https://ambrosiaforheads.com/feed/',
      'https://rapindustry.com/feed/',
      'https://dilemaradio.com/feed/',
      'https://spiceonthebeat.com/feed/',
      'https://uproxx.com/music/feed/',
      'https://www.okayplayer.com/feed',
      'https://hiphopvibe.com/feed/',
      'https://djbooth.net/rss/all',
      'https://rapzilla.com/feed/',
      'https://hiphopgoldenage.com/feed/',
      'https://rapradar.com/feed/',
      'https://respectmyregion.com/feed/',
      'https://siccness.net/rss.xml'
    ];
    const sportsFeeds = [
      'https://www.espn.com/espn/rss/news',
      'https://feeds.bbci.co.uk/sport/rss.xml?edition=uk',
      'https://www.skysports.com/rss/12040',
      'https://www.nba.com/rss/nba_rss.xml',
      'https://www.nfl.com/rss/rsslanding?searchString=home',
      'https://www.goal.com/feeds/en/news/africa/1',
      'https://www.si.com/rss/si_topstories.rss',
      'https://www.sportsnet.ca/feed/'
    ];

    async function getBestThumbnail(item) {
      // 1. Try Microlink for the article link
      try {
        const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(item.link)}&meta=true`);
        const json = await res.json();
        let imgUrl =
          (json?.data?.image?.url && /\.(jpe?g|png|webp|gif)$/i.test(json.data.image.url) ? json.data.image.url : null) ||
          (json?.data?.logo?.url && /\.(jpe?g|png|webp|gif)$/i.test(json.data.logo.url) ? json.data.logo.url : null) ||
          (json?.data?.meta?.image && /\.(jpe?g|png|webp|gif)$/i.test(json.data.meta.image) ? json.data.meta.image : null);
        if (imgUrl) return imgUrl;
      } catch (e) {}
      // 2. Try RSS enclosure
      if (item.enclosure && item.enclosure.link && /\.(jpe?g|png|webp|gif)$/i.test(item.enclosure.link)) {
        return item.enclosure.link;
      }
      // 3. Try RSS thumbnail
      if (item.thumbnail && /\.(jpe?g|png|webp|gif)$/i.test(item.thumbnail)) {
        return item.thumbnail;
      }
      // 4. Try extracting from HTML as a last resort
      try {
        const doc = new DOMParser().parseFromString(item.content || item.description || '', "text/html");
        const ogImg = doc.querySelector('meta[property="og:image"], meta[name="og:image"]');
        if (ogImg && ogImg.content && /\.(jpe?g|png|webp|gif)$/i.test(ogImg.content)) return ogImg.content;
        const imgEl = doc.querySelector('img');
        if (imgEl && imgEl.src) return imgEl.src;
      } catch {}
      // 5. Default placeholder
      return 'https://via.placeholder.com/140x100?text=News';
    }

    function showLoading(container) {
      container.innerHTML = '<div class="spinner" aria-label="Loading"></div>';
      container.setAttribute('aria-busy', 'true');
    }
    function showError(container, msg = 'Some feeds failed to load. Please check your internet connection or try again later.') {
      [...container.querySelectorAll('.error-msg')].forEach(e => e.remove());
      const errorDiv = document.createElement('div');
      errorDiv.className = 'error-msg';
      errorDiv.textContent = msg;
      container.appendChild(errorDiv);
      container.setAttribute('aria-busy', 'false');
    }

    function createStoryDiv(story) {
      const div = document.createElement('div');
      div.className = 'story';
      div.innerHTML = `<a href="${story.link}" target="_blank" rel="noopener noreferrer">
        <img src="${story.img}" alt="${story.title}" loading="lazy">
        <p>${story.title}</p>
      </a>`;
      const img = div.querySelector('img');
      img.onerror = () => {
        img.onerror = null;
        img.src = 'https://via.placeholder.com/140x100?text=News';
        img.alt = 'No thumbnail available';
      };
      return div;
    }

    async function loadFeedStories2Rows(feedList, sliceCount, row1Id, row2Id, alt) {
      const row1 = document.getElementById(row1Id);
      const row2 = document.getElementById(row2Id);
      if (!row1 || !row2) return;
      showLoading(row1);
      showLoading(row2);
      row1.innerHTML = '';
      row2.innerHTML = '';
      let loadedAny = false;
      let allStories = [];
      for (let feed of feedList) {
        try {
          const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}`);
          if (!res.ok) throw new Error('Request failed');
          const data = await res.json();
          if (!data.items || !Array.isArray(data.items) || data.items.length === 0) throw new Error('Invalid/empty RSS data');
          const items = data.items.slice(0, sliceCount).filter(item => item && item.title && item.link);
          for (let item of items) {
            const img = await getBestThumbnail(item);
            allStories.push({
              link: item.link,
              title: item.title,
              img
            });
            loadedAny = true;
          }
        } catch (err) {
          console.error(`${alt} Feed error:`, feed, err);
        }
      }
      allStories = allStories.filter((s, i, arr) => arr.findIndex(e => e.link === s.link) === i);
      const half = Math.ceil(allStories.length / 2);
      const row1Stories = allStories.slice(0, half);
      const row2Stories = allStories.slice(half);
      for (let story of row1Stories) row1.appendChild(createStoryDiv(story));
      for (let story of row2Stories) row2.appendChild(createStoryDiv(story));
      if (!loadedAny) {
        showError(row1, `All ${alt} feeds failed to load.`);
        showError(row2, `All ${alt} feeds failed to load.`);
      } else if (allStories.length < feedList.length * sliceCount) {
        showError(row1, `Some ${alt} feeds failed to load.`);
        showError(row2, `Some ${alt} feeds failed to load.`);
      }
      row1.setAttribute('aria-busy', 'false');
      row2.setAttribute('aria-busy', 'false');
    }

    function reloadAll() {
      loadFeedStories2Rows(feeds, 5, 'stories-row1', 'stories-row2', 'story');
      loadFeedStories2Rows(hiphopFeeds, 3, 'hiphop-row1', 'hiphop-row2', 'hiphop');
      loadFeedStories2Rows(sportsFeeds, 2, 'sports-row1', 'sports-row2', 'sports');
    }
    reloadAll();
    setInterval(() => loadFeedStories2Rows(feeds, 5, 'stories-row1', 'stories-row2', 'story'), 300000);

    function applyTheme(theme) {
      document.body.classList.remove('light', 'dark');
      document.body.classList.add(theme);
      const btn = document.querySelector('.theme-toggle');
      btn.textContent = theme === 'dark' ? '☀️' : '🌙';
    }
    function toggleTheme() {
      const current = document.body.classList.contains('dark') ? 'dark' : 'light';
      const newTheme = current === 'dark' ? 'light' : 'dark';
      applyTheme(newTheme);
      localStorage.setItem('theme', newTheme);
    }
    (function initializeTheme() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const themeToApply = saved || (prefersDark ? 'dark' : 'light');
      applyTheme(themeToApply);
    })();
