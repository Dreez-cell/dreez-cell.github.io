<body>
  <!-- [unchanged content above] -->  <div id="sports-grid" style="display:grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px;" role="list" aria-label="Sports news stories"></div>  <script>
    // [unchanged JavaScript code above]

    // Updated utility to fetch image from content if missing
    function extractImageFromContent(content) {
      const match = content.match(/<img[^>]+src\s*=\s*['"]([^'"]+)['"]/);
      return match ? match[1] : null;
    }

    async function fetchRSS(url) {
      try {
        const api = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(url);
        const res = await fetch(api);
        const json = await res.json();
        if (json.status === 'ok') return json.items;
        else return [];
      } catch (e) {
        console.error('Failed to fetch RSS:', url, e);
        return [];
      }
    }

    async function loadStories() {
      const container = document.getElementById('stories');
      container.innerHTML = '';
      document.getElementById('loading-stories').style.display = 'block';

      for (const feedUrl of feeds) {
        const items = await fetchRSS(feedUrl);
        items.slice(0,3).forEach(item => {
          const img = item.thumbnail || item.enclosure?.link || extractImageFromContent(item.content) || 'https://via.placeholder.com/120x80?text=No+Image';
          const story = document.createElement('div');
          story.className = 'story';
          story.setAttribute('role','listitem');
          story.innerHTML = `
            <a href="${item.link}" target="_blank" rel="noopener noreferrer" aria-label="${item.title}">
              <img src="${img}" alt="${item.title}" loading="lazy" />
              <p>${item.title}</p>
            </a>
          `;
          container.appendChild(story);
        });
      }

      document.getElementById('loading-stories').style.display = 'none';
    }

    async function loadSports() {
      const container = document.getElementById('sports-grid');

        const items = await fetchRSS(feedUrl);

          const img = item.thumbnail || item.enclosure?.link || extractImageFromContent(item.content) || 'https://via.placeholder.com/200x120?text=No+Image';
          const card = document.createElement('div');
          card.className = 'sports-card';
          card.setAttribute('role','listitem');
          card.innerHTML = `
            <a href="${item.link}" target="_blank" rel="noopener noreferrer" aria-label="${item.title}">
              <img src="${img}" alt="${item.title}" loading="lazy" />
              <p>${item.title}</p>
            </a>
          `;
          container.appendChild(card);
        });
      }
    }

    loadStories();
