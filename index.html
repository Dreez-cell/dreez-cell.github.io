  <style>
    :root {
      --primary: #3a8ee6;
      --primary-hover: #2a6cc0;
      --border-light: #e3e8ef;
      --border-dark: #242a32;
      --bg-light: #fafdff;
      --bg-dark: #10131a;
      --container-max: 1100px;
      --side-width: 300px;
      --main-width: 750px;
      --gap: 32px;
      --radius: 14px;
      --shadow: 0 2px 18px 0 rgba(0,0,0,0.09);
      --shadow-dark: 0 2px 20px 0 rgba(255,255,255,0.09);
      --glass: rgba(255,255,255,0.60);
      --glass-dark: rgba(24,28,38,0.7);
      --fadein: fadein 0.7s cubic-bezier(.4,2,.3,1);
    }
    @keyframes fadein { from { opacity: 0; transform: scale(.94); } to { opacity: 1; transform: scale(1);} }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-light);
      color: #1a2233;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.3s, color 0.3s;
      padding-bottom: 30px;
    }
    body.light { background: var(--bg-light); color: #1a2233; }
    body.dark { background: var(--bg-dark); color: #f5f7fa; }
    header {
      height: 58px;
      width: 100%;
      max-width: var(--container-max);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
      border-bottom: 1px solid var(--border-light);
      background: var(--glass);
      color: inherit;
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-radius: 0 0 var(--radius) var(--radius);
      box-shadow: var(--shadow);
      transition: background 0.2s;
      user-select:none;
    }
    body.dark header {
      border-color: var(--border-dark);
      background: var(--glass-dark);
      box-shadow: var(--shadow-dark);
    }
    .theme-toggle {
      font-size: 2rem;
      background: none;
      border: none;
      cursor: pointer;
      color: inherit;
      transition: transform 0.18s cubic-bezier(.4,2,.3,1);
      outline: none;
      border-radius: 50%;
      padding: 5px;
    }
    .theme-toggle:focus-visible { outline: 2px solid var(--primary); }
    .theme-toggle:active, .theme-toggle:hover { transform: scale(1.21) rotate(-10deg);}
    .skip-link {
      position: absolute;
      left: -9999px;
      top: 0;
      background: #fff;
      color: #222;
      padding: 8px 16px;
      z-index: 9999;
      border-radius: 0 0 5px 5px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.13);
      transition: left 0.2s;
    }
    .skip-link:focus {
      left: 10px;
      top: 10px;
      outline: 2px solid var(--primary);
    }
    .layout {
      display: flex;
      flex-direction: row;
      gap: var(--gap);
      width: 100%;
      max-width: var(--container-max);
      margin: 0 auto;
      padding: var(--gap) 8px 0 8px;
      min-height: 80vh;
      align-items: flex-start;
    }
    .main-content {
      flex: 1 1 var(--main-width);
      max-width: var(--main-width);
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .sidebar {
      flex: 0 0 var(--side-width);
      max-width: var(--side-width);
      min-width: 210px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: sticky;
      top: 75px;
      align-self: flex-start;
    }
    section > h2 {
      margin-bottom: 7px;
      font-size: 1.34rem;
      font-weight: 800;
      letter-spacing: -.5px;
      color: var(--primary-hover);
      text-shadow: 0 2px 8px rgba(58,142,230,0.09);
    }
    .carousel-2row { display: flex; flex-direction: column; gap: 10px; }
    .carousel-2row .story-container-row {
      display: flex;
      overflow-x: auto;
      gap: 16px;
      padding: 10px 3px 0 3px;
      border-bottom: none;
      scroll-behavior: smooth;
      min-height: 0;
      scrollbar-width: thin;
      scrollbar-color: var(--primary) #f0f6fa;
    }
    .carousel-2row .story-container-row:last-child {
      border-bottom: 1px solid var(--border-light);
    }
    body.dark .carousel-2row .story-container-row:last-child {
      border-color: #444;
    }
    body.light .carousel-2row .story-container-row:last-child {
      border-color: #ddd;
    }
    .story {
      flex: 0 0 auto;
      width: 140px;
      min-height: 220px;
      background: var(--glass);
      border-radius: var(--radius);
      text-align: center;
      overflow: hidden;
      box-shadow: 0 2px 7px rgba(0,0,0,0.10);
      transition: box-shadow .23s, border .21s, background .15s, transform .18s cubic-bezier(.4,2,.3,1);
      display: flex;
      flex-direction: column;
      color: inherit;
      border: 1.5px solid #f2f2f2;
      position: relative;
      animation: var(--fadein);
      animation-fill-mode: forwards;
    }
    body.dark .story { background: var(--glass-dark); border-color: #23273a; }
    .story:focus-within, .story:hover {
      transform: scale(1.07) translateY(-5px) rotate(-1.5deg);
      border: 1.5px solid var(--primary);
      z-index: 2;
      box-shadow: 0 10px 26px 0 rgba(58,142,230,0.18), 0 2px 6px rgba(0,0,0,0.13);
      background: var(--bg-light);
    }
    body.dark .story:focus-within, body.dark .story:hover {
      background: var(--glass-dark);
    }
    .story a {
      color: inherit;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      height: 100%;
      outline: none;
    }
    .story img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-bottom: 1.5px solid #ccd;
      flex-shrink: 0;
      border-radius: var(--radius) var(--radius) 0 0;
      filter: drop-shadow(0 0 2px rgba(0,0,0,0.06));
      transition: filter 0.2s, background 0.2s;
      background: #e8e8e8;
      display: block;
      aspect-ratio: 14/10;
    }
    .story img.loading { filter: blur(6px) grayscale(80%);}
    .story img.error {
      content: url('https://via.placeholder.com/140x100?text=News');
      background: #f2f2f2;
    }
    .story p {
      padding: 10px 7px 0 7px;
      font-size: 14.7px;
      line-height: 1.32;
      /* height: 100px; */ /* Removed fixed height */
      /* overflow: hidden; */ /* Changed for better text visibility */
      flex-grow: 1;
      text-align: left;
      font-weight: 600;
      color: inherit;
      letter-spacing: -.3px;
      display: -webkit-box;
      -webkit-line-clamp: 4; /* Show up to 4 lines and then ellipsis */
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
      background: transparent;
    }
    /* Responsive fixes */
    @media (max-width: 1200px) {
      .layout { max-width: 100vw; }
      .main-content { max-width: 96vw; }
      .sidebar { max-width: 230px; min-width: 140px; }
    }
    @media (max-width: 900px) {
      .layout { flex-direction: column; gap: 0; }
      .main-content { max-width: 100vw; }
      .sidebar { position: static; max-width: 100vw; flex-direction: row; gap: 13px;}
      .ad-box, .thread-box { max-width: 340px; margin: 0 10px 12px 0; }
    }
    @media (max-width: 700px) {
      header { font-size: 1.1rem; height: 44px;}
      .main-content { gap: 12px; }
      .disqus-section { padding: 8px 2px 0 2px; }
      .carousel-2row .story-container-row { gap: 7px; }
      .sidebar { flex-direction: column; gap: 9px; }
    }
    @media (max-width: 600px) {
      .story { width: 100px; min-height: 180px; }
      .story p {
        font-size: 12px;
        /* height: 55px; */ /* Removed fixed height */
        -webkit-line-clamp: 5; /* Show up to 5 lines on mobile */
      }
      .disqus-section, .trends-box { min-height: 90px; }
      .sidebar { min-width: 0; max-width: 100vw; }
    }
    @media (max-width: 400px) {
      .story { width: 98vw; min-height: 120px; }
      .disqus-section { padding: 4px 0 0 0;}
      header { font-size: .95rem; }
    }
    @media (max-width: 350px) {
      .layout { padding: 2px; }
      .ad-box, .thread-box { padding: 4px; }
    }
    .ad-box, .thread-box {
      margin: 0 0 12px 0;
      padding: 16px 13px;
      border-radius: var(--radius);
      box-shadow: 0 0 12px rgba(0,0,0,0.06);
      background: var(--glass);
      color: #222;
      transition: background 0.24s, color 0.3s;
      width: 100%;
      max-width: 100%;
      position: relative;
      border: 1.2px solid #e0e6f0;
    }
    body.dark .ad-box, body.dark .thread-box {
      background: var(--glass-dark);
      box-shadow: 0 0 16px rgba(255,255,255,0.09);
      color: #ddd;
      border: 1.2px solid #23273a;
    }
    .disqus-section {
      background: var(--glass);
      border-radius: var(--radius);
      box-shadow: 0 2px 24px rgba(0,0,0,0.11);
      padding: 24px 16px 0 16px;
      margin-top: 36px;
      width: 100%;
      max-width: var(--main-width);
      min-height: 300px;
      position: relative;
      z-index: 10;
      border: 1px solid #eee;
    }
    body.dark .disqus-section {
      background: var(--glass-dark);
      box-shadow: 0 2px 28px rgba(255,255,255,0.07);
      border-color: #282828;
    }
    .disqus-section h2 {
      font-size: 1.15rem;
      font-weight: 800;
      margin-bottom: 12px;
      color: var(--primary-hover);
      letter-spacing: -.5px;
    }
    .trends-box {
      margin: 30px 0 0 0;
      padding: 11px 0 7px 0;
      border-radius: var(--radius);
      box-shadow: 0 0 8px rgba(0,0,0,0.07);
      background: var(--glass);
      color: #222;
      width: 100%;
      max-width: 100%;
      min-height: 180px;
      border: 1.2px solid #e0e6f0;
    }
    body.dark .trends-box {
      background: var(--glass-dark);
      color: #f4f8ff;
      box-shadow: 0 0 16px rgba(255,255,255,0.12);
      border: 1.2px solid #23273a;
    }
    .trends-box iframe {
      width: 100%;
      min-height: 250px;
      border: none;
      border-radius: var(--radius);
      background: inherit;
      transition: box-shadow 0.2s;
      box-shadow: 0 2px 16px rgba(58,142,230,0.07);
    }
    a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.32s;
    }
    a:hover, a:focus {
      color: var(--primary-hover);
      text-decoration: underline;
      outline: none;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 4px solid #c4d0e0;
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 34px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg {
      color: #b00020;
      font-weight: 600;
      text-align: center;
      margin: 12px 0;
      font-size: 1em;
    }
  </style>
</head>

    // ---- THUMBNAIL: best first, fallback last ----
    async function getBestThumbnail(item) {
      try {
        const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(item.link)}&meta=true`);
        const json = await res.json();
        let imgUrl =
          (json?.data?.image?.url && /\.(jpe?g|png|webp|gif)$/i.test(json.data.image.url) ? json.data.image.url : null) ||
          (json?.data?.logo?.url && /\.(jpe?g|png|webp|gif)$/i.test(json.data.logo.url) ? json.data.logo.url : null) ||
          (json?.data?.meta?.image && /\.(jpe?g|png|webp|gif)$/i.test(json.data.meta.image) ? json.data.meta.image : null);
        if (imgUrl) return imgUrl;
      } catch {}
      if (item.enclosure && item.enclosure.link && /\.(jpe?g|png|webp|gif)$/i.test(item.enclosure.link)) {
        return item.enclosure.link;
      }
      if (item.thumbnail && /\.(jpe?g|png|webp|gif)$/i.test(item.thumbnail)) {
        return item.thumbnail;
      }
      try {
        const doc = new DOMParser().parseFromString(item.content || item.description || '', "text/html");
        const ogImg = doc.querySelector('meta[property="og:image"], meta[name="og:image"]');
        if (ogImg && ogImg.content && /\.(jpe?g|png|webp|gif)$/i.test(ogImg.content)) return ogImg.content;
        const imgEl = doc.querySelector('img');
        if (imgEl && imgEl.src) return imgEl.src;
      } catch {}
      return 'https://via.placeholder.com/140x100?text=News';
    }
    // ---- UTILS ----
    function showLoading(container) {
      container.innerHTML = '<div class="spinner" aria-label="Loading"></div>';
      container.setAttribute('aria-busy', 'true');
    }
    function showError(container, msg = 'Some feeds failed to load. Please check your internet connection or try again later.') {
      [...container.querySelectorAll('.error-msg')].forEach(e => e.remove());
      const errorDiv = document.createElement('div');
      errorDiv.className = 'error-msg';
      errorDiv.textContent = msg;
      container.appendChild(errorDiv);
      container.setAttribute('aria-busy', 'false');
    }
    function createStoryDiv(story) {
      const div = document.createElement('div');
      div.className = 'story';
      div.setAttribute('tabindex', '0');
      div.innerHTML = `<a href="${story.link}" target="_blank" rel="noopener noreferrer">
        <img src="${story.img}" alt="${story.title.replace(/["']/g,'')}" loading="lazy" draggable="false">
        <p>${story.title}</p>
      </a>`;
      const img = div.querySelector('img');
      img.onerror = () => {
        img.onerror = null;
        img.classList.add('error');
        img.src = 'https://via.placeholder.com/140x100?text=News';
        img.alt = 'No thumbnail available';
      };
      img.classList.add('loading');
      img.onload = () => { img.classList.remove('loading'); };
      return div;
    }
    // ---- RESPONSIVE SLICE ----
    function getSliceCount(base, min) {
      if (window.innerWidth < 400) return Math.max(min, base - 2);
      if (window.innerWidth < 700) return Math.max(min, base - 1);
      return base;
    }
    // ---- LAZY LOADING STORIES IN VIEW ONLY ----
    function lazyLoadStories(carouselId, loader) {
      const section = document.getElementById(carouselId);
      if (!section) return;
      let loaded = false;
      function onEnter(entries, observer) {
        if (entries[0].isIntersecting && !loaded) {
          loaded = true;
          loader();
          observer.disconnect();
        }
      }
      const io = new IntersectionObserver(onEnter, { threshold: 0.03 });
      io.observe(section);
    }
    // ---- FASTEST STORY FETCH (Promise.any for speed) ----
    async function loadFeedStories2Rows(feedList, sliceCount, row1Id, row2Id, alt) {
      const row1 = document.getElementById(row1Id);
      const row2 = document.getElementById(row2Id);
      if (!row1 || !row2) return;
      row1.innerHTML = '';
      row2.innerHTML = '';
      showLoading(row1);
      showLoading(row2);
      let allStories = [];
      let displayedLinks = new Set();
      let loadedAny = false;
      // Helper for fade-in and display
      function displayStories(batch) {
        allStories.push(...batch.filter(story =>
          story.title && story.link && !displayedLinks.has(story.link)
        ));
        allStories = allStories.slice(0, sliceCount * 2);
        allStories.forEach(s => displayedLinks.add(s.link));
        // Split two rows
        const half = Math.ceil(allStories.length / 2);
        const row1Stories = allStories.slice(0, half);
        const row2Stories = allStories.slice(half);
        row1.innerHTML = '';
        row2.innerHTML = '';
        for (let story of row1Stories) row1.appendChild(createStoryDiv(story));
        for (let story of row2Stories) row2.appendChild(createStoryDiv(story));
        row1.setAttribute('aria-busy', 'false');
        row2.setAttribute('aria-busy', 'false');
      }
      // Promise.any: first successful feed gets displayed immediately for perceived speed
      let promises = feedList.map(async feed => {
        try {
          const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}`);
          if (!res.ok) throw new Error('Request failed');
          const data = await res.json();
          if (!data.items || !Array.isArray(data.items) || data.items.length === 0) throw new Error('Invalid/empty RSS data');
          const items = data.items.slice(0, sliceCount).filter(item => item && item.title && item.link);
          const thumbBatch = await Promise.all(items.map(async item => ({
            link: item.link,
            title: item.title,
            img: await getBestThumbnail(item)
          })));
          if (thumbBatch.length > 0) {
            loadedAny = true;
            displayStories(thumbBatch);
          }
          return thumbBatch.length;
        } catch {
          return 0;
        }
      });
      // Wait for at least one batch to succeed, then continue filling up with others
      await Promise.any(promises);
      // Fallback: ensure enough stories, especially for sports
      if (allStories.length < sliceCount * 2) {
        let extraStories = [];
        for (let feed of feedList) {
          try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}`);
            const data = await res.json();
            for (let item of (data.items || [])) {
              if (!allStories.some(s => s.link === item.link) && !extraStories.some(s => s.link === item.link)) {
                const img = await getBestThumbnail(item);
                extraStories.push({ link: item.link, title: item.title, img });
              }
              if (allStories.length + extraStories.length >= sliceCount * 2) break;
            }
          } catch {}
          if (allStories.length + extraStories.length >= sliceCount * 2) break;
        }
        allStories.push(...extraStories.slice(0, sliceCount * 2 - allStories.length));
        displayStories([]);
      }
      // Show error if nothing loaded
      if (!loadedAny && allStories.length === 0) {
        showError(row1, `All ${alt} feeds failed to load.`);
        showError(row2, `All ${alt} feeds failed to load.`);
      } else if (allStories.length < sliceCount * 2) {
        showError(row1, `Some ${alt} feeds failed to load or not enough stories available.`);
        showError(row2, `Some ${alt} feeds failed to load or not enough stories available.`);
      }
    }
    // ---- CAROUSEL LAZY-LOADING AND RESIZE ----
    function reloadAllCarousels() {
      loadFeedStories2Rows(feeds, getSliceCount(5, 2), 'stories-row1', 'stories-row2', 'story');
      loadFeedStories2Rows(hiphopFeeds, getSliceCount(3, 2), 'hiphop-row1', 'hiphop-row2', 'hiphop');
      loadFeedStories2Rows(sportsFeeds, getSliceCount(4, 2), 'sports-row1', 'sports-row2', 'sports');
    }
    // Lazy load: only load when visible for each, for speed
    lazyLoadStories('stories-carousel', () => loadFeedStories2Rows(feeds, getSliceCount(5, 2), 'stories-row1', 'stories-row2', 'story'));
    lazyLoadStories('hiphop-carousel', () => loadFeedStories2Rows(hiphopFeeds, getSliceCount(3, 2), 'hiphop-row1', 'hiphop-row2', 'hiphop'));
    lazyLoadStories('sports-carousel', () => loadFeedStories2Rows(sportsFeeds, getSliceCount(4, 2), 'sports-row1', 'sports-row2', 'sports'));
    // Debounced resize event for reloads
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(reloadAllCarousels, 260);
    });
    // Periodic refresh, but only if carousel is visible
    function isElementInViewport(id) {
      const el = document.getElementById(id);
      if (!el) return false;
      const rect = el.getBoundingClientRect();
      return rect.bottom > 0 && rect.top < window.innerHeight;
    }
    setInterval(() => {
      if (isElementInViewport('stories-carousel')) loadFeedStories2Rows(feeds, getSliceCount(5, 2), 'stories-row1', 'stories-row2', 'story');
    }, 300000);
    setInterval(() => {
      if (isElementInViewport('hiphop-carousel')) loadFeedStories2Rows(hiphopFeeds, getSliceCount(3, 2), 'hiphop-row1', 'hiphop-row2', 'hiphop');
    }, 180000);
    setInterval(() => {
      if (isElementInViewport('sports-carousel')) loadFeedStories2Rows(sportsFeeds, getSliceCount(4, 2), 'sports-row1', 'sports-row2', 'sports');
    }, 240000);
    // ---- DISQUS COMMENTS ----
    var disqus_config = function () {
      this.page.url = window.location.href;
      this.page.identifier = window.location.pathname;
    };
    (function () {
      var d = document, s = d.createElement('script');
      s.src = 'https://celebrity-gossip-3.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    })();
    // ---- THEME LOGIC ----
    function applyTheme(theme) {
      document.body.classList.remove('light', 'dark');
      document.body.classList.add(theme);
      const btn = document.querySelector('.theme-toggle');
      btn.textContent = theme === 'dark' ? '☀️' : '🌙';
    }
    function toggleTheme() {
      const current = document.body.classList.contains('dark') ? 'dark' : 'light';
      const newTheme = current === 'dark' ? 'light' : 'dark';
      applyTheme(newTheme);
      localStorage.setItem('theme', newTheme);
    }
    (function initializeTheme() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const themeToApply = saved || (prefersDark ? 'dark' : 'light');
      applyTheme(themeToApply);
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        if (!localStorage.getItem('theme')) applyTheme(e.matches ? 'dark' : 'light');
      });
    })();
  </script>
</body>
