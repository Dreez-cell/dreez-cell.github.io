    :root {
      --primary: #3a8ee6;
      --primary-hover: #2a6cc0;
      --border-light: #ccc;
      --border-dark: #333;
      --bg-light: #fff;
      --bg-dark: #121212;
      --container-max: 1200px;
      --side-width: 320px;
      --main-width: 750px;
      --gap: 30px;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.09);
      --shadow-dark: 0 2px 20px rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-light);
      color: #000;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 30px;
      transition: background 0.3s, color 0.3s;
    }
    body.light { background: var(--bg-light); color: #000; }
    body.dark { background: var(--bg-dark); color: #eee; }
    header {
      height: 64px;
      width: 100%;
      max-width: var(--container-max);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
      border-bottom: 1px solid var(--border-light);
      background: inherit;
      color: inherit;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
      border-radius: 0 0 var(--radius) var(--radius);
    }
    body.dark header {
      border-color: var(--border-dark);
      box-shadow: var(--shadow-dark);
    }
    .theme-toggle {
      font-size: 2rem;
      background: none;
      border: none;
      cursor: pointer;
      color: inherit;
      transition: transform 0.2s ease;
      outline: none;
    }
    .theme-toggle:focus-visible { outline: 2px solid var(--primary); }
    .theme-toggle:hover { transform: rotate(20deg); }
    .skip-link {
      position: absolute;
      left: -9999px;
      top: 0;
      background: #fff;
      color: #222;
      padding: 8px 16px;
      z-index: 9999;
      border-radius: 0 0 5px 5px;
      font-weight: bold;
    }
    .skip-link:focus {
      left: 10px;
      top: 10px;
      outline: 2px solid var(--primary);
    }
    /* --- MAIN LAYOUT --- */
    .layout {
      display: flex;
      flex-direction: row;
      gap: var(--gap);
      width: 100%;
      max-width: var(--container-max);
      margin: 0 auto;
      padding: var(--gap) 10px 0 10px;
      min-height: 80vh;
      align-items: flex-start;
    }
    .main-content {
      flex: 1 1 var(--main-width);
      max-width: var(--main-width);
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 26px;
    }
    .sidebar {
      flex: 0 0 var(--side-width);
      max-width: var(--side-width);
      min-width: 260px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      position: sticky;
      top: 85px;
      align-self: flex-start;
    }
    /* --- CAROUSEL --- */
    section > h2 {
      margin-bottom: 8px;
      font-size: 1.28rem;
      font-weight: 700;
      letter-spacing: -.5px;
    }
    .carousel-2row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .carousel-2row .story-container-row {
      display: flex;
      overflow-x: auto;
      gap: 14px;
      padding: 10px 5px 0 5px;
      border-bottom: none;
      scroll-behavior: smooth;
      min-height: 0;
    }
    .carousel-2row .story-container-row:last-child {
      border-bottom: 1px solid var(--border-light);
    }
    body.dark .carousel-2row .story-container-row:last-child {
      border-color: #444;
    }
    body.light .carousel-2row .story-container-row:last-child {
      border-color: #ddd;
    }
    .story {
      flex: 0 0 auto;
      width: 140px;
      height: 220px;
      background: #eee;
      border-radius: var(--radius);
      text-align: center;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.10);
      transition: transform 0.2s, box-shadow 0.3s;
      display: flex;
      flex-direction: column;
      color: inherit;
    }

      box-shadow: 0 2px 8px rgba(255,255,255,0.07);
    }

      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
      z-index: 2;
    }
    .story a {

      text-decoration: none;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .story img {

      border-bottom: 1px solid #ccc;
      flex-shrink: 0;
      border-radius: var(--radius) var(--radius) 0 0;
      filter: drop-shadow(0 0 2px rgba(0,0,0,0.05));
      transition: filter 0.3s, background 0.3s;
      background: #d8d8d8;
      display: block;
      aspect-ratio: 14/10;

    body.dark .story img {
      border-color: #555;
      filter: drop-shadow(0 0 3px rgba(255,255,255,0.1));
      background: #222;

    .story img.loading {

      background: #f2f2f2;

      flex-grow: 1;
      text-align: left;

    .ad-box, .thread-box {
      margin: 0 0 12px 0;

      border-radius: var(--radius);

      font-size: 1.23rem;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--primary-hover);
      letter-spacing: -.5px;
    }
    /* --- TRENDS IFRAME --- */
    .trends-box {
      margin: 36px 0 0 0;
      padding: 8px 0;
      border-radius: var(--radius);
      box-shadow: 0 0 8px rgba(0,0,0,0.06);
      background: #f7fafc;
      color: #222;
      width: 100%;
      max-width: 100%;
      min-height: 220px;
    }
    body.dark .trends-box {
      background: #22263b;
      color: #f4f8ff;
      box-shadow: 0 0 14px rgba(255,255,255,0.10);
    }
    .trends-box iframe {
      width: 100%;
      min-height: 340px;
      border: none;
      border-radius: var(--radius);
      background: inherit;
    }
    /* --- GENERAL --- */
    a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.3s;
    }
    a:hover, a:focus {
      color: var(--primary-hover);
      text-decoration: underline;
      outline: none;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 4px solid #ccc;
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg {
      color: #b00020;
      font-weight: 600;
      text-align: center;
      margin: 20px 0;
    }
    /* --- RESPONSIVE --- */
    @media (max-width: 1200px) {
      .layout { max-width: 100vw; }
      .main-content { max-width: 96vw; }
      .sidebar { max-width: 280px; min-width: 200px; }
    }
    @media (max-width: 900px) {
      .layout { flex-direction: column; gap: 0; padding-left: 0; padding-right: 0;}
      .main-content { max-width: 100vw; }
      .sidebar { position: static; max-width: 100vw; flex-direction: row; gap: 18px; margin-bottom: 0; }
      .ad-box, .thread-box { max-width: 340px; margin: 0 10px 12px 0; }
    }
    @media (max-width: 700px) {
      header { font-size: 1.3rem; height: 48px;}
      .main-content { gap: 15px; }
      .disqus-section { padding: 10px 2px 0 2px; }
      .carousel-2row .story-container-row { gap: 10px; }
      .sidebar { flex-direction: column; gap: 14px; }
    }
    @media (max-width: 600px) {
      .story { width: 120px; height: 190px; }
      .story p { font-size: 13px; height: 80px; }
      .disqus-section, .trends-box { min-height: 100px; }
      .sidebar { min-width: 0; max-width: 100vw; }
    }
    @media (max-width: 400px) {
      .story { width: 98vw; height: 150px; }
      .disqus-section { padding: 4px 0 0 0;}
      header { font-size: 1rem; }
    }
    @media (max-width: 350px) {
      .layout { padding: 2px; }
      .ad-box, .thread-box { padding: 4px; }
    }

    // --- IMAGE UTILS ---
    async function extractImageFromHTML(html) {
      try {
        if (!html) return 'https://via.placeholder.com/140x100?text=No+Image';
        const doc = new DOMParser().parseFromString(html, "text/html");
        // Try to get OpenGraph image if present
        const metaOgImage = doc.querySelector('meta[property="og:image"], meta[name="og:image"]');
        if (metaOgImage && metaOgImage.content) return metaOgImage.content;
        // Otherwise, get the first image in the HTML content
        const imgEl = doc.querySelector('img');
        return imgEl?.src || 'https://via.placeholder.com/140x100?text=No+Image';
      } catch {
        return 'https://via.placeholder.com/140x100?text=No+Image';
      }
    }
    async function getMicrolinkImage(url, fallbackHTML, altText) {
      try {
        const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}&meta=true`);
        const json = await res.json();
        // Prefer og:image or meta.image
        if (json?.data?.image?.url) return json.data.image.url;
        if (json?.data?.logo?.url) return json.data.logo.url;
        if (json?.data?.meta?.image) return json.data.meta.image;
        // Try fallback extraction
        return await extractImageFromHTML(fallbackHTML);
      } catch {
        return await extractImageFromHTML(fallbackHTML);
      }
    }
    // --- LOADING/ERROR STATES ---
    function showLoading(container) {
      container.innerHTML = '<div class="spinner" aria-label="Loading"></div>';
      container.setAttribute('aria-busy', 'true');
    }
    function showError(container, msg = 'Some feeds failed to load. Please check your internet connection or try again later.') {
      [...container.querySelectorAll('.error-msg')].forEach(e => e.remove());
      const errorDiv = document.createElement('div');
      errorDiv.className = 'error-msg';
      errorDiv.textContent = msg;
      container.appendChild(errorDiv);
      container.setAttribute('aria-busy', 'false');
    }
    // --- MAIN FEED LOADER for 2-row carousels ---
    async function loadFeedStories2Rows(feedList, sliceCount, row1Id, row2Id, alt) {
      const row1 = document.getElementById(row1Id);
      const row2 = document.getElementById(row2Id);
      if (!row1 || !row2) return;
      showLoading(row1);
      showLoading(row2);
      row1.innerHTML = '';
      row2.innerHTML = '';
      let loadedAny = false;
      let allStories = [];
      for (let feed of feedList) {
        try {
          const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}`);
          if (!res.ok) throw new Error('Request failed');
          const data = await res.json();
          if (!data.items || !Array.isArray(data.items) || data.items.length === 0) throw new Error('Invalid/empty RSS data');
          const items = data.items.slice(0, sliceCount).filter(item => item && item.title && item.link);
          for (let item of items) {
            // Use enclosure image if present and valid
            let img = '';
            if (item.enclosure && item.enclosure.link && /\.(jpe?g|png|webp|gif)$/i.test(item.enclosure.link)) {
              img = item.enclosure.link;
            } else if (item.thumbnail && /\.(jpe?g|png|webp|gif)$/i.test(item.thumbnail)) {
              img = item.thumbnail;
            } else {
              img = await getMicrolinkImage(item.link, item.content || item.description, item.title);
            }
            allStories.push({
              link: item.link,
              title: item.title,
              img
            });
            loadedAny = true;
          }
        } catch (err) {
          console.error(`${alt} Feed error:`, feed, err);
        }
      }
      // Deduplicate stories by link to avoid duplicates from similar feeds
      allStories = allStories.filter((s, i, arr) => arr.findIndex(e => e.link === s.link) === i);
      // Sort stories by original feed order (optionally could sort by pubDate)
      const half = Math.ceil(allStories.length / 2);
      const row1Stories = allStories.slice(0, half);
      const row2Stories = allStories.slice(half);
      // Helper for robust image loading with fallback
      function createStoryDiv(story) {
        const div = document.createElement('div');
        div.className = 'story';
        div.innerHTML = `<a href="${story.link}" target="_blank" rel="noopener noreferrer">
  <img src="https://via.placeholder.com/140x100?text=Loading..." alt="${story.title}" class="loading" loading="lazy">
  <p></p>
</a>`;
        div.querySelector('p').textContent = story.title;
        const img = div.querySelector('img');
        // Use a Proxy image loader for progressive/fallback experience
        if (story.img && story.img !== 'https://via.placeholder.com/140x100?text=No+Image') {
          img.src = story.img;
        }
        img.onload = () => img.classList.remove('loading');
        img.onerror = () => {
          img.classList.remove('loading');
          img.classList.add('error');
          img.alt = 'No thumbnail available';
        };
        return div;
      }
      for (let story of row1Stories) {
        row1.appendChild(createStoryDiv(story));
      }
      for (let story of row2Stories) {
        row2.appendChild(createStoryDiv(story));
      }
      if (!loadedAny) {
        showError(row1, `All ${alt} feeds failed to load.`);
        showError(row2, `All ${alt} feeds failed to load.`);
      } else if (allStories.length < feedList.length * sliceCount) {
        showError(row1, `Some ${alt} feeds failed to load.`);
        showError(row2, `Some ${alt} feeds failed to load.`);
      }
      row1.setAttribute('aria-busy', 'false');
      row2.setAttribute('aria-busy', 'false');
    }
    // --- LOAD & REFRESH ---
    function reloadAll() {
      loadFeedStories2Rows(feeds, 5, 'stories-row1', 'stories-row2', 'story');
      loadFeedStories2Rows(hiphopFeeds, 3, 'hiphop-row1', 'hiphop-row2', 'hiphop');
      loadFeedStories2Rows(sportsFeeds, 2, 'sports-row1', 'sports-row2', 'sports');
    }
    reloadAll();
    setInterval(() => loadFeedStories2Rows(feeds, 5, 'stories-row1', 'stories-row2', 'story'), 300000);
    setInterval(() => loadFeedStories2Rows(hiphopFeeds, 3, 'hiphop-row1', 'hiphop-row2', 'hiphop'), 180000);
    setInterval(() => loadFeedStories2Rows(sportsFeeds, 2, 'sports-row1', 'sports-row2', 'sports'), 240000);
    // --- DISQUS ---
    var disqus_config = function () {
      this.page.url = window.location.href;
      this.page.identifier = window.location.pathname;
    };
    (function () {
      var d = document, s = d.createElement('script');
      s.src = 'https://celebrity-gossip-3.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    })();
    // --- THEME SWITCH ---
    function applyTheme(theme) {
      document.body.classList.remove('light', 'dark');
      document.body.classList.add(theme);
      const btn = document.querySelector('.theme-toggle');
      btn.textContent = theme === 'dark' ? '☀️' : '🌙';
    }
    function toggleTheme() {
      const current = document.body.classList.contains('dark') ? 'dark' : 'light';
      const newTheme = current === 'dark' ? 'light' : 'dark';
      applyTheme(newTheme);
      localStorage.setItem('theme', newTheme);
    }
    (function initializeTheme() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const themeToApply = saved || (prefersDark ? 'dark' : 'light');
      applyTheme(themeToApply);
    })();
  </script>
</body>
