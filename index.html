    async function extractImageFromHTML(html) {
      const match = html?.match(/<img[^>]+src=["']([^"']+)["']/);
      return match ? match[1] : 'https://via.placeholder.com/120x80?text=No+Image';
    }

    async function getMicrolinkImage(url, fallbackHTML) {
      try {
        const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
        const json = await res.json();
        return json.data.image?.url || await extractImageFromHTML(fallbackHTML);
      } catch {
        return await extractImageFromHTML(fallbackHTML);
      }
    }

    async function loadStories() {
      const container = document.getElementById('stories');
      container.innerHTML = '';
      for (const feed of feeds) {
        try {
          const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}`);
          const data = await res.json();
          for (let item of data.items.slice(0, 5)) {
            const img = await getMicrolinkImage(item.link, item.content || item.description);
            const div = document.createElement('div');
            div.className = 'story';
            div.innerHTML = `<a href="${item.link}" target="_blank" rel="noopener noreferrer"><img src="${img}" alt="story"><p>${item.title}</p></a>`;
            container.appendChild(div);
          }
        } catch (err) {
          console.error('Feed error:', feed, err);
        }
      }
    }

    async function loadHipHopStories() {
      const container = document.getElementById('hiphop-carousel');
      container.innerHTML = '';
      for (const feed of hiphopFeeds) {
        try {
          const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}`);
          const data = await res.json();
          for (let item of data.items.slice(0, 3)) {
            const img = await getMicrolinkImage(item.link, item.content || item.description);
            const div = document.createElement('div');
            div.className = 'story';
            div.innerHTML = `<a href="${item.link}" target="_blank" rel="noopener noreferrer"><img src="${img}" alt="hiphop"><p>${item.title}</p></a>`;
            container.appendChild(div);
          }
        } catch (err) {
          console.error('HipHop Feed error:', feed, err);
        }
      }
    }

    async function loadMagazineStories() {
      const container = document.getElementById('rss-magazine');
      container.innerHTML = '';
      for (const feed of sportsFeeds) {
        try {
          const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}`);
          const data = await res.json();
          for (let item of data.items.slice(0, 2)) {
            const img = await getMicrolinkImage(item.link, item.content || item.description);
            const div = document.createElement('div');
            div.className = 'story';
            div.innerHTML = `<a href="${item.link}" target="_blank" rel="noopener noreferrer"><img loading="lazy" src="${img}" alt="${item.title}"><p>${item.title}</p></a>`;
          }
        } catch (err) {
          console.error('Sports Feed error:', feed, err);
        }
      }
    }

    loadStories();
    setInterval(loadStories, 300000);

    loadHipHopStories();
    setInterval(loadHipHopStories, 180000);

    loadMagazineStories();

    var disqus_config = function () {

      (d.head || d.body).appendChild(s);
    })();

    function applyTheme(theme) {
      document.body.classList.remove('light', 'dark');
      document.body.classList.add(theme);
    }

    function toggleTheme() {
      const current = document.body.classList.contains('dark') ? 'dark' : 'light';
      const newTheme = current === 'dark' ? 'light' : 'dark';
      applyTheme(newTheme);
      localStorage.setItem('theme', newTheme);
    }

    (function initializeTheme() {
      const saved = localStorage.getItem('theme');
      if (saved) {
        applyTheme(saved);
      } else {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        applyTheme(prefersDark ? 'dark' : 'light');
      }
    })();
  </script>

<script>
  const sportsFeeds = [
    'https://www.espn.com/espn/rss/news',
    'https://feeds.bbci.co.uk/sport/rss.xml',
    'https://www.skysports.com/rss/12040',
    'https://www.nba.com/rss/nba_rss.xml',
    'https://www.nfl.com/rss/rsslanding?searchString=home',
    'https://www.goal.com/feeds/en/news',
    'https://www.cafonline.com/rss',
    'https://www.si.com/rss/si_topstories.rss'
  ];

  async function getMicrolinkImage(link, fallbackContent) {
    try {
      const response = await fetch(`https://jsonlink.io/api/extract?url=${encodeURIComponent(link)}`);
      const data = await response.json();
      return data.images?.[0] || data.video?.image || "https://dreez-cell.github.io/icons/icon-512.png";
    } catch {
      const match = fallbackContent?.match(/<img.*?src="(.*?)"/);
      return match?.[1] || "https://dreez-cell.github.io/icons/icon-512.png";
    }
  }

  async function loadSportsSlider() {
    const container = document.getElementById('sports-slider');
    container.innerHTML = '';
    for (const feed of sportsFeeds) {
      try {
        const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}`);
        const data = await res.json();
        for (let item of data.items.slice(0, 2)) {
          const img = await getMicrolinkImage(item.link, item.content || item.description);
          const card = document.createElement('div');
          card.className = 'sports-card';
          card.innerHTML = `
            <a href="${item.link}" target="_blank" rel="noopener noreferrer">
              <img src="${img}" alt="${item.title}" loading="lazy" />
              <p>${item.title}</p>
            </a>`;
          container.appendChild(card);
        }
      } catch (err) {
        console.error('Sports Feed Error:', err);
      }
    }
  }

  loadSportsSlider();
  setInterval(loadSportsSlider, 300000); // Refresh every 5 mins
</script>
